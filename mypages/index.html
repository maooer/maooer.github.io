<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>MaooerHo's index</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;500;700;900&display=swap">
</head>
<body>
    <header><!--logo--></header>
    <main>
        <section>
            <!-- 商品搜索-->
            <div id="search-bar">
                <input type="text" id="search-input" placeholder="搜索产品">
                <button id="search-bottom">搜索</button>
            </div>
            <!--商品分类-->
            <div id="categories">
                <!--添加商品分类-->
            </div>
        </section>
        <section>
            <!--商品展示部分-->
            <div id="product-list">
                <!--Js生成商品列表-->
            </div>
        </section>
    </main>
    <footer>
        <!--页脚-->
        <section>
            <div class="myname">
                <p>by Maooer Ho</p>
            </div>
        </section>
    </footer>
    <!--JavaScript 文件-->
    <script src="scripts/main.js"></script>
</body>
</html>
